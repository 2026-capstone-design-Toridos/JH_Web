# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ghosttracker_shop?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=ghosttracker-shop-secret-key-must-be-at-least-256-bits-long-for-security
app.jwt.expiration=86400000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# CORS allowed origin (React dev server)
app.cors.allowed-origin=http://localhost:3000

# Logging
logging.level.com.ghosttracker=DEBUG
